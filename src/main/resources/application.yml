server:
  port: ${HTTP_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: svc-batch
  lifecycle:
    timeout-per-shutdown-phase: 15s

  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME:batch}?sslMode=REQUIRED&serverTimezone=UTC&characterEncoding=utf8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false
    # url/user/password 미지정 — Boot 가 위 spring.datasource 빈을 그대로 재사용 (단일 커넥션/유저).

  # Spring Batch 메타데이터를 batch_meta 스키마로 분리. 실제 datasource 는 여전히 batch 하나 —
  # table-prefix 로 스키마까지 포함해 정규화하면 같은 커넥션/유저(app_batch, batch/batch_meta 양쪽
  # GRANT 보유)로 cross-schema DML 이 통한다 (런타임 쿼리에서는 실제로 동작 확인).
  batch:
    job:
      enabled: false # Job 빈 없음 (2M/3M 에서 추가) — 기동 시 job 탐색 실패 방지
    jdbc:
      table-prefix: batch_meta.BATCH_
      # Boot 자동 초기화는 DDL 단계에서 prefix 의 스키마 한정자를 반영하지 못하고 BATCH_* 테이블을
      # batch_meta 가 아니라 커넥션 기본 스키마(batch)에 만들어버려 꺼둔다(통합 테스트로 재현/확인).
      # 메타 테이블은 Flyway V2__batch_meta_schema.sql 이 batch_meta 스키마에 직접 생성한다.
      initialize-schema: never

  data:
    redis:
      url: redis://${REDIS_ADDR}/${REDIS_DB:2}

# 로컬 기본값은 개발 편의용 — 운영은 항상 NATS_URL env 로 덮어씀.
# 서버 미기동 상태로도 컨텍스트가 뜨도록 NatsConfig 가 retryOnFailedConnect 로 연결한다
# (연결 성공 시점에 stream/durable consumer 를 기동 — svc-batch/PLAN.md §4 참고).
app:
  nats:
    url: ${NATS_URL:nats://localhost:4222}

# actuator 의 prometheus 엔드포인트를 /metrics 로 노출 (go-app 씨앗과 동일 경로)
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: prometheus
      path-mapping:
        prometheus: metrics
  metrics:
    tags:
      application: svc-batch
